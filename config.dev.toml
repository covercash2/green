port = 10000
ca_path = "fixtures/testCA.pem"
log_level = "debug,sqlx=warn"
vault_path = "fixtures/vault"

[log_config]
app_log = "logs/logs.ndjson"
error_log = "logs/errors.log"

[auth]
rp_id = "dev.green.chrash.net"
rp_origin = "https://dev.green.chrash.net"
# Placeholder — real URL is supplied at runtime via GREEN_DB_URL (set in secrets.toml).
db_url = "postgres://green:placeholder@localhost/green"
gm_users = ["chrash"]
ntfy_url = "http://localhost:8083/green-recovery"

[mqtt]
host = "localhost"
port = 1883
username = "green"
client_id = "green-mqtt-dev"
# GREEN_MQTT_PASSWORD env var supplies the password at runtime

[[mqtt.integrations]]
pattern = "zigbee2mqtt/{device}/**"

[[mqtt.integrations]]
pattern = "homeassistant/*/{device}/**"
name = "Home Assistant"

[[mqtt.integrations]]
pattern = "frigate/{device}/**"
name = "Frigate"

[[mqtt.integrations]]
pattern = "zwavejs/{device}/**"
name = "Z-Wave"

[systemd]
units = ["postgresql", "mosquitto", "caddy"]

[routes.foundry]
url = "foundry.green.chrash.net"
description = "Foundry VTT for D&D games"

[routes.ultron]
url = "ultron.green.chrash.net"
description = "Ultron chat server"

[routes.adguard]
url = "adguard.green.chrash.net"
description = "AdGuard Home DNS server and ad blocking"

[routes.grafana]
url = "grafana.green.chrash.net"
description = "Grafana for monitoring and visualization"

[routes.frigate]
url = "frigate.green.chrash.net"
description = "Frigate NVR for camera surveillance"

[routes.postgres]
url = "db.green.chrash.net"
description = "PostgreSQL database server"

[routes.homeassistant]
url = "homeassistant.green.chrash.net"
description = "Home Assistant for home automation"
