<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}green{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050505">
    <link rel="stylesheet" href="/assets/css/l33t.css?v={{ version }}">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
    <link rel="manifest" href="/assets/favicon/site.webmanifest">
</head>
<body class="leet-theme">
    <div class="leet-container">
        <nav class="leet-nav">
        {% if let Some(user) = auth_user %}
            <span class="leet-nav-user">{{ user.username }}</span>
            <form action="/auth/logout" method="post" class="leet-nav-form">
                <button class="leet-nav-btn" type="submit">sign out</button>
            </form>
        {% else %}
            <a href="/auth/login" class="leet-link">sign in</a>
        {% endif %}
        </nav>
        {% block content %}{% endblock %}
        <footer class="leet-footer">v{{ version }}</footer>
    </div>
{% block scripts %}{% endblock %}
</body>
</html>
