{% extends "base.html" %}

{% block styles %}
<link rel="stylesheet" href="/assets/css/mqtt.css?v={{ version }}">
{% endblock %}

{% block title %}mqtt{% endblock %}

{% block content %}
<div class="leet-page-nav">
    <a href="/" class="leet-link">&larr; back</a>
    <a href="/mqtt/devices" class="leet-link">devices &rarr;</a>
</div>
<h1 class="leet-h1">mqtt live feed</h1>

<div id="mqtt-status-bar" class="mqtt-status-bar">
    <span class="mqtt-dot mqtt-dot-connecting"></span>
    <span class="mqtt-status-text">connecting…</span>
</div>

<div id="mqtt-topics" class="mqtt-topics"></div>

<div class="mqtt-filter-bar">
    <input
        id="mqtt-filter"
        class="mqtt-filter"
        type="search"
        placeholder="filter by topic…"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="none"
        spellcheck="false"
    >
</div>

<div id="mqtt-controls" class="mqtt-controls"></div>

<div class="mqtt-feed" id="mqtt-feed"></div>
{% endblock %}

{% block scripts %}
<script type="module" src="/assets/js/mqtt.js?v={{ version }}"></script>
{% endblock %}
