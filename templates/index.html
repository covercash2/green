{% extends "base.html" %}

{% block title %}green{% endblock %}

{% block content %}
<h1 class="leet-h1">routes</h1>
<ul class="list-group">
    {% for entry in routes %}
    <li class="leet-list-item">
        <a href="{{ entry.href }}" class="leet-link">{{ entry.name }}</a>
        <div class="leet-description">{{ entry.description }}</div>
    </li>
    {% endfor %}
</ul>
{% endblock %}
